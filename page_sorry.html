<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>I'm Sorry, Faiqa 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;overflow-x:hidden;}
body{background:#040108;font-family:'Lato',sans-serif;cursor:none;}
.cursor{position:fixed;z-index:9999;pointer-events:none;font-size:18px;transform:translate(-5px,-18px);}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
.exit-overlay{position:fixed;inset:0;background:#040108;z-index:1000;opacity:0;pointer-events:none;transition:opacity .6s;}
.exit-overlay.active{opacity:1;pointer-events:all;}

#bgc{position:fixed;inset:0;z-index:0;}
.bg-grad{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 70% 55% at 50% 85%,rgba(100,20,60,.35),transparent 60%),radial-gradient(ellipse 50% 40% at 20% 20%,rgba(80,10,50,.25),transparent 55%);}

.petal{position:fixed;pointer-events:none;z-index:3;font-size:clamp(10px,2vw,18px);animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{0%{transform:translateY(-20px) rotate(0deg);opacity:0;}10%{opacity:.7;}85%{opacity:.3;}100%{transform:translateY(105vh) rotate(var(--rot));opacity:0;}}

.page-wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   CUTE ANIMATED SORRY CHARACTER
━━━━━━━━━━━━━━━━━━━━━━━━ */
.sorry-char{
  width:120px;height:120px;position:relative;
  margin:0 auto 28px;
  animation:charBounce 2s ease-in-out infinite;
}
@keyframes charBounce{0%,100%{transform:translateY(0);}40%{transform:translateY(-12px);}70%{transform:translateY(-4px);}}

/* Body — soft round blob */
.char-body{
  width:80px;height:76px;
  background:radial-gradient(circle at 42% 38%,#ffd6e5,#e8627a);
  border-radius:50% 50% 48% 48% / 55% 55% 45% 45%;
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  box-shadow:0 4px 18px rgba(232,98,122,.35),inset 0 -4px 8px rgba(0,0,0,.1);
}
/* Blush */
.char-blush{
  position:absolute;width:14px;height:8px;
  border-radius:50%;background:rgba(255,120,140,.45);
  bottom:26px;
}
.char-blush.l{left:6px;}
.char-blush.r{right:6px;}

/* Eyes */
.char-eye{
  position:absolute;width:10px;height:12px;
  background:#2a1010;border-radius:50%;
  bottom:40px;
  animation:eyeBlink 3.5s ease-in-out infinite;
}
@keyframes eyeBlink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(.1);}}
.char-eye.l{left:18px;}
.char-eye.r{right:18px;}
/* Eye shine */
.char-eye::after{content:'';position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;top:2px;right:2px;}

/* Mouth — sad sorry arc */
.char-mouth{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  width:22px;height:8px;
  border:2px solid #2a1010;border-top:none;
  border-radius:0 0 22px 22px;
}
/* Arms */
.char-arm{
  position:absolute;width:14px;height:36px;
  background:radial-gradient(circle at 50% 30%,#ffd6e5,#e8627a);
  border-radius:50% 50% 40% 40%;
  bottom:14px;
}
.char-arm.l{left:-8px;transform:rotate(-25deg);transform-origin:top center;}
.char-arm.r{right:-8px;transform:rotate(25deg);transform-origin:top center;}

/* Head */
.char-head{
  width:68px;height:68px;
  background:radial-gradient(circle at 42% 38%,#ffe8f0,#f5b8cc);
  border-radius:50%;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  box-shadow:inset 0 -3px 8px rgba(0,0,0,.08);
}
/* Ears */
.char-head::before,.char-head::after{
  content:'';position:absolute;
  width:18px;height:22px;
  background:radial-gradient(circle at 40% 35%,#ffe8f0,#f0a0b8);
  border-radius:50%;top:-6px;
}
.char-head::before{left:4px;transform:rotate(-15deg);}
.char-head::after{right:4px;transform:rotate(15deg);}

/* Tear drops */
.char-tear{
  position:absolute;
  width:6px;height:8px;
  background:rgba(180,220,255,.7);
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  animation:tearDrop 2.5s ease-in-out infinite;
}
.char-tear.l{bottom:36px;left:12px;animation-delay:.3s;}
.char-tear.r{bottom:36px;right:12px;animation-delay:.8s;}
@keyframes tearDrop{0%,60%{opacity:0;transform:translateY(0) scale(.3);}30%{opacity:.8;transform:translateY(4px) scale(1);}60%{opacity:0;transform:translateY(10px) scale(.5);}100%{opacity:0;}}

/* Sorry text that orbits the character */
.sorry-bubble{
  position:absolute;top:-14px;right:-24px;
  background:rgba(232,98,122,.1);border:1px solid rgba(232,98,122,.3);
  padding:4px 9px;border-radius:12px;
  font-family:'Lato',sans-serif;font-size:11px;font-weight:700;
  color:rgba(232,98,122,.75);letter-spacing:1px;
  animation:bubbleFloat 2s ease-in-out infinite;
}
@keyframes bubbleFloat{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-5px) rotate(-5deg);}}
.sorry-bubble::after{content:'';position:absolute;bottom:-6px;left:12px;width:8px;height:8px;background:inherit;border-right:1px solid rgba(232,98,122,.3);border-bottom:1px solid rgba(232,98,122,.3);transform:rotate(45deg);}

/* ━━━━━━━━━━━━━━━━━━━━━━━━ */

.sorry-pre-label{font-family:'Lato',sans-serif;font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(232,98,122,.4);margin-bottom:12px;animation:fadeIn .8s .5s both;}

.sorry-title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:clamp(36px,8vw,68px);color:#f5e8f0;line-height:1;margin-bottom:8px;animation:fadeIn .9s .8s both;}
.sorry-title em{font-style:italic;color:#e8627a;}
.sorry-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(14px,2.5vw,18px);color:rgba(245,232,240,.35);margin-bottom:32px;animation:fadeIn .8s 1s both;}

/* Letter card */
.letter-card{max-width:580px;width:100%;background:rgba(255,255,255,.025);border:1px solid rgba(232,98,122,.15);overflow:hidden;animation:fadeIn .7s 1.2s both;position:relative;}
.letter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(232,98,122,.4),transparent);}

/* Sealed state */
.seal-state{padding:36px 32px;text-align:center;cursor:none;}
.rose-seal{width:72px;height:72px;border-radius:50%;margin:0 auto 16px;background:radial-gradient(circle at 38% 33%,#e8627a,#8b1a3a);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 22px rgba(140,26,58,.5),0 0 50px rgba(140,26,58,.15);animation:roseSealPulse 2.5s ease-in-out infinite;cursor:none;transition:transform .3s;}
.rose-seal:hover{transform:scale(1.07);}
@keyframes roseSealPulse{0%,100%{box-shadow:0 4px 22px rgba(140,26,58,.5);}50%{box-shadow:0 4px 36px rgba(200,40,80,.7),0 0 60px rgba(180,30,70,.2);}}
.seal-label{font-family:'Lato',sans-serif;font-size:10px;font-weight:700;color:rgba(232,98,122,.32);letter-spacing:3px;text-transform:uppercase;}

/* Open state */
.open-state{display:none;padding:32px 28px 24px;}
.letter-from{font-family:'Lato',sans-serif;font-size:10px;font-weight:300;color:rgba(232,98,122,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid rgba(232,98,122,.08);}
.letter-body{font-family:'Lato',sans-serif;font-size:15px;font-weight:300;color:rgba(245,232,240,.78);line-height:2.1;min-height:60px;}
.tw-cursor{display:inline-block;width:1.5px;height:1em;background:rgba(232,98,122,.7);vertical-align:middle;margin-left:1px;animation:twBlink .7s step-end infinite;}
@keyframes twBlink{0%,100%{opacity:1;}50%{opacity:0;}}

.letter-sig{margin-top:24px;text-align:right;padding-top:12px;border-top:1px solid rgba(232,98,122,.08);display:none;}
.sig-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:rgba(232,98,122,.5);}
.sig-note{font-family:'Lato',sans-serif;font-size:10px;font-weight:300;color:rgba(245,232,240,.2);letter-spacing:2px;margin-top:4px;text-transform:uppercase;}

/* Continue button — goes to chapter 3, NOT index */
.continue-wrap{text-align:center;margin-top:26px;display:none;animation:fadeUp .7s forwards;}
.cont-btn{display:inline-block;padding:13px 36px;background:linear-gradient(160deg,#7a1a35,#500f22);border:1px solid rgba(232,98,122,.3);color:rgba(245,228,234,.85);font-family:'Lato',sans-serif;font-weight:700;font-size:11px;letter-spacing:4px;text-transform:uppercase;cursor:none;text-decoration:none;transition:all .4s;}
.cont-btn:hover{box-shadow:0 6px 28px rgba(120,10,40,.5);letter-spacing:5px;}

/* Chapter note */
.chapter-note{font-family:'Lato',sans-serif;font-size:9px;font-weight:300;color:rgba(232,98,122,.25);letter-spacing:2px;text-align:center;margin-top:12px;text-transform:uppercase;}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<div class="bg-grad"></div>
<div class="cursor" id="cursor">🌸</div>
<div class="exit-overlay" id="ov"></div>

<div class="page-wrap">

  <!-- Cute animated sorry character -->
  <div class="sorry-char">
    <div class="char-head"></div>
    <div class="char-body">
      <div class="char-eye l"></div>
      <div class="char-eye r"></div>
      <div class="char-blush l"></div>
      <div class="char-blush r"></div>
      <div class="char-mouth"></div>
      <div class="char-tear l"></div>
      <div class="char-tear r"></div>
    </div>
    <div class="char-arm l"></div>
    <div class="char-arm r"></div>
    <div class="sorry-bubble">sorry 🌸</div>
  </div>

  <p class="sorry-pre-label">🌸 &nbsp; a page just for you</p>
  <h1 class="sorry-title">I'm <em>sorry,</em><br>Faiqa.</h1>
  <p class="sorry-sub">tap the seal to read this honestly</p>

  <div class="letter-card" id="letterCard">
    <div class="seal-state" id="sealState">
      <div class="rose-seal" id="sealBtn">🌸</div>
      <p class="seal-label">tap to open</p>
    </div>
    <div class="open-state" id="openState">
      <div class="letter-from">🌸 &nbsp; written honestly — no excuses — just the truth</div>
      <div class="letter-body" id="ltxt"><span class="tw-cursor"></span></div>
      <div class="letter-sig" id="lsig">
        <div class="sig-name">— Waqas &nbsp;🌸</div>
        <div class="sig-note">genuinely sorry · always</div>
      </div>
    </div>
  </div>

  <div class="continue-wrap" id="contWrap">
    <!-- Continues Chapter II — not ending the journey -->
    <a href="page3.html" class="cont-btn" id="nb">Continue — Chapter II &nbsp; →</a>
    <p class="chapter-note">· your story doesn't end here ·</p>
  </div>
</div>

<script>
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

/* BG starfield */
(function(){
  const cv=document.getElementById('bgc'),cx=cv.getContext('2d');
  function rs(){cv.width=innerWidth;cv.height=innerHeight;}
  rs();window.addEventListener('resize',rs);
  const st=[];
  for(let i=0;i<180;i++)st.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.2+.2,o:Math.random()*.5+.1,s:.002+Math.random()*.005,d:Math.random()>.5?1:-1});
  function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    const bg=cx.createRadialGradient(cv.width/2,cv.height*.6,0,cv.width/2,cv.height*.3,cv.width*.9);
    bg.addColorStop(0,'#100515');bg.addColorStop(.5,'#080210');bg.addColorStop(1,'#040108');
    cx.fillStyle=bg;cx.fillRect(0,0,cv.width,cv.height);
    st.forEach(s=>{s.o+=s.s*s.d;if(s.o>.65||s.o<.06)s.d*=-1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,180,200,${s.o*.7})`;cx.fill();});
    requestAnimationFrame(draw);
  }
  draw();
})();

/* Falling petals */
const petalEmojis=['🌸','🌷','❀','🌺'];
for(let i=0;i<12;i++){
  const p=document.createElement('div');p.className='petal';
  p.textContent=petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.cssText=`left:${Math.random()*100}vw;--rot:${(Math.random()-.5)*360}deg;animation-duration:${12+Math.random()*16}s;animation-delay:${Math.random()*12}s;`;
  document.body.appendChild(p);
}

const sorryLetter=`Faiqa,

Main pehle sorry bolunga aur phir explain karunga — kyunki yeh ulta hona chahiye tha.

Jo baat maine poochi — woh galat thi. Tareeqa galat tha. Woh cheez poochni hi nahi chahiye thi. Aur mujhe pata tha jab main bol raha tha — phir bhi bol diya. Yeh meri ghalti hai, aur iske liye koi justification nahi hai.

Lekin jo cheez mujhe sabse zyada takleef deti hai woh yeh nahi hai.

Yeh hai — ke tum beemar thi. Fever tha. Tum pehle se thaki hui thi. Aur is waqt maine tumhara haath thamne ki jagah... 28 ghante ke liye gayab ho gaya. Tumhe yeh message karna pada ke mujhe ignore mat karo — jab ke ignore karne wala main tha.

Yeh carelessness nahi thi. Yeh ek choice thi. Aur mujhe is choice par sharm aati hai.

Tum ne ek baar kaha tha ke tum ne expect kiya tha ke main tum ko manaane keliye sari raat messages karta rahunga. Main woh insaan nahi bana us waqt. Aur tum deserve karti thi woh insaan.

Mujhe pata hai sirf sorry likhne se kuch nahi badalta. Lekin yeh jaano — koi din aisa nahi gaya jab main woh 28 ghante nahi socha. Koi din aisa nahi gaya jab mujhe guilty nahi laga.

Tum mere liye woh insaan ho jiske liye main khud se better banana chahta hun. Is Eid par — yehi dua hai. Ke tum jaano ke tum kisi ke liye is qadar ahem ho ke uski ghalti use raat ko neend nahi aane deti.

Main maafi manga raha hun. Puri tarah. Dil se.

🌸`;

document.getElementById('sealBtn').addEventListener('click',openLetter);
document.getElementById('sealBtn').addEventListener('touchend',function(e){e.preventDefault();openLetter();},{passive:false});

function openLetter(){
  document.getElementById('sealState').style.display='none';
  document.getElementById('openState').style.display='block';
  setTimeout(startType,350);
}

function startType(){
  const el=document.getElementById('ltxt');
  el.innerHTML='<span class="tw-cursor"></span>';
  let i=0;const ch=sorryLetter.split('');
  function type(){
    if(i>=ch.length){
      el.querySelector('.tw-cursor')?.remove();
      document.getElementById('lsig').style.display='block';
      document.getElementById('contWrap').style.display='block';
      return;
    }
    const c=el.querySelector('.tw-cursor');
    if(ch[i]==='\n')c.insertAdjacentHTML('beforebegin','<br>');
    else c.insertAdjacentText('beforebegin',ch[i]);
    i++;
    const d=ch[i-1]==='.'||ch[i-1]===','?150:ch[i-1]==='\n'?200:24;
    setTimeout(type,d);
  }
  setTimeout(type,300);
}

document.getElementById('nb')?.addEventListener('click',function(e){
  e.preventDefault();document.getElementById('ov').classList.add('active');
  setTimeout(()=>window.location.href=this.href,620);
});
</script>
</body>
</html>
