<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>I'm Sorry, Faiqa 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;overflow-x:hidden;}
body{
  background:#040108;
  font-family:'Lato',sans-serif;
  cursor:none;
}
.cursor{position:fixed;z-index:9999;pointer-events:none;font-size:18px;transform:translate(-5px,-18px);}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.exit-overlay{position:fixed;inset:0;background:#040108;z-index:1000;opacity:0;pointer-events:none;transition:opacity .6s;}
.exit-overlay.active{opacity:1;pointer-events:all;}

/* ── BG: soft deep purple-rose ── */
#bgc{position:fixed;inset:0;z-index:0;}
.bg-grad{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 50% 85%,rgba(100,20,60,.35),transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 20%,rgba(80,10,50,.25),transparent 55%),
    radial-gradient(ellipse 40% 35% at 80% 10%,rgba(60,20,80,.2),transparent 50%);
}

/* ── PETAL PARTICLES ── */
.petal{position:fixed;pointer-events:none;z-index:3;font-size:clamp(10px,2vw,18px);animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0;}
  10%{opacity:.7;}
  85%{opacity:.3;}
  100%{transform:translateY(105vh) rotate(var(--rot));opacity:0;}
}

/* ── MAIN CONTENT ── */
.page-wrap{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:52px 20px 60px;
}

/* ── FLOWER ANIMATION (CSS only) ── */
.flower-scene{
  width:140px;height:140px;
  margin:0 auto 36px;
  position:relative;
}
.flower-core{
  position:absolute;
  width:32px;height:32px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#ffe08a,#f5a623);
  top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:5;
  box-shadow:0 0 18px rgba(245,166,35,.4);
  animation:coreGlow 3s ease-in-out infinite;
}
@keyframes coreGlow{0%,100%{box-shadow:0 0 18px rgba(245,166,35,.4);}50%{box-shadow:0 0 30px rgba(245,166,35,.7);}}

/* 8 petals radially placed */
.petal-item{
  position:absolute;
  width:36px;height:54px;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  top:50%;left:50%;
  transform-origin:50% 100%;
  animation:petalBloom 2.5s cubic-bezier(.34,1.56,.64,1) forwards, petalSway 4s ease-in-out infinite 2.5s;
  opacity:0;
}
@keyframes petalBloom{
  0%{transform:translate(-50%,-100%) scale(.2) rotate(var(--r));opacity:0;}
  60%{opacity:1;}
  100%{transform:translate(-50%,-100%) scale(1) rotate(var(--r));opacity:.92;}
}
@keyframes petalSway{
  0%,100%{filter:brightness(1);}
  50%{filter:brightness(1.12);}
}
/* Rose pink petals */
.petal-item:nth-child(1){--r:0deg;background:linear-gradient(180deg,#ffb3c6,#e8627a);animation-delay:.1s;}
.petal-item:nth-child(2){--r:45deg;background:linear-gradient(180deg,#ffc2d4,#e8627a);animation-delay:.2s;}
.petal-item:nth-child(3){--r:90deg;background:linear-gradient(180deg,#ffb3c6,#d94f6e);animation-delay:.3s;}
.petal-item:nth-child(4){--r:135deg;background:linear-gradient(180deg,#ffc2d4,#e8627a);animation-delay:.4s;}
.petal-item:nth-child(5){--r:180deg;background:linear-gradient(180deg,#ffb3c6,#e8627a);animation-delay:.5s;}
.petal-item:nth-child(6){--r:225deg;background:linear-gradient(180deg,#ffc2d4,#d94f6e);animation-delay:.6s;}
.petal-item:nth-child(7){--r:270deg;background:linear-gradient(180deg,#ffb3c6,#e8627a);animation-delay:.7s;}
.petal-item:nth-child(8){--r:315deg;background:linear-gradient(180deg,#ffc2d4,#d94f6e);animation-delay:.8s;}

/* Inner petals layer */
.petal-inner{
  position:absolute;
  width:22px;height:34px;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  top:50%;left:50%;
  transform-origin:50% 100%;
  animation:petalBloom 2.2s cubic-bezier(.34,1.56,.64,1) forwards, petalSway 3.5s ease-in-out infinite 2.2s;
  opacity:0;
}
.petal-inner:nth-child(9){--r:22deg;background:linear-gradient(180deg,#ffd6e2,#e8627a);animation-delay:.9s;}
.petal-inner:nth-child(10){--r:112deg;background:linear-gradient(180deg,#ffd6e2,#d94f6e);animation-delay:1s;}
.petal-inner:nth-child(11){--r:202deg;background:linear-gradient(180deg,#ffd6e2,#e8627a);animation-delay:1.1s;}
.petal-inner:nth-child(12){--r:292deg;background:linear-gradient(180deg,#ffd6e2,#d94f6e);animation-delay:1.2s;}

/* Stem */
.stem{
  position:absolute;
  width:3px;height:60px;
  background:linear-gradient(to bottom,#2d5a1b,#1a3a0f);
  bottom:-30px;left:50%;transform:translateX(-50%);
  border-radius:0 0 2px 2px;
  animation:stemGrow 1.5s ease-out forwards;
  transform-origin:bottom;
}
@keyframes stemGrow{from{transform:translateX(-50%) scaleY(0);}to{transform:translateX(-50%) scaleY(1);}}

/* Leaf */
.leaf{
  position:absolute;
  width:22px;height:14px;
  background:linear-gradient(135deg,#3a7a1f,#2d5a1b);
  border-radius:0 100% 0 100%;
  bottom:8px;left:calc(50% - 2px);
  transform-origin:0% 100%;
  animation:leafGrow 1.8s .5s ease-out forwards;
  opacity:0;
}
@keyframes leafGrow{0%{transform:scale(0) rotate(-20deg);opacity:0;}100%{transform:scale(1) rotate(-20deg);opacity:.85;}}
.leaf2{
  position:absolute;
  width:18px;height:12px;
  background:linear-gradient(135deg,#3a7a1f,#2d5a1b);
  border-radius:100% 0 100% 0;
  bottom:18px;right:calc(50% - 2px);
  transform-origin:100% 100%;
  animation:leafGrow2 1.8s .7s ease-out forwards;
  opacity:0;
}
@keyframes leafGrow2{0%{transform:scale(0) rotate(20deg);opacity:0;}100%{transform:scale(1) rotate(20deg);opacity:.75;}}

/* ── TYPEWRITER LETTER ── */
.sorry-pre-label{
  font-family:'Lato',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:5px;text-transform:uppercase;
  color:rgba(232,98,122,.4);margin-bottom:12px;
  animation:fadeIn .8s .5s both;
}

.sorry-title{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  font-size:clamp(36px,8vw,68px);
  color:#f5e8f0;line-height:1;
  margin-bottom:8px;
  animation:fadeIn .9s .8s both;
}
.sorry-title em{font-style:italic;color:#e8627a;}

.sorry-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(14px,2.5vw,18px);
  color:rgba(245,232,240,.35);
  margin-bottom:36px;
  animation:fadeIn .8s 1s both;
}

/* The letter card */
.letter-card{
  max-width:580px;width:100%;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(232,98,122,.15);
  padding:0;
  overflow:hidden;
  animation:fadeIn .7s 1.2s both;
  position:relative;
}
.letter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(232,98,122,.4),transparent);}

/* Sealed state */
.seal-state{padding:40px 32px;text-align:center;cursor:none;}
.rose-seal{
  width:72px;height:72px;border-radius:50%;margin:0 auto 16px;
  background:radial-gradient(circle at 38% 33%,#e8627a,#8b1a3a);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 4px 22px rgba(140,26,58,.5),0 0 50px rgba(140,26,58,.15);
  animation:roseSealPulse 2.5s ease-in-out infinite;cursor:none;transition:transform .3s;
}
.rose-seal:hover{transform:scale(1.07);}
@keyframes roseSealPulse{0%,100%{box-shadow:0 4px 22px rgba(140,26,58,.5);}50%{box-shadow:0 4px 36px rgba(200,40,80,.7),0 0 60px rgba(180,30,70,.2);}}
.seal-label{font-family:'Lato',sans-serif;font-size:10px;font-weight:700;color:rgba(232,98,122,.32);letter-spacing:3px;text-transform:uppercase;}

/* Open state */
.open-state{display:none;padding:36px 32px 28px;}
.letter-from{
  font-family:'Lato',sans-serif;font-size:10px;font-weight:300;
  color:rgba(232,98,122,.4);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(232,98,122,.08);
}
.letter-body{
  font-family:'Lato',sans-serif;font-size:15px;font-weight:300;
  color:rgba(245,232,240,.78);line-height:2.1;min-height:60px;
}
.tw-cursor{display:inline-block;width:1.5px;height:1em;background:rgba(232,98,122,.7);vertical-align:middle;margin-left:1px;animation:twBlink .7s step-end infinite;}
@keyframes twBlink{0%,100%{opacity:1;}50%{opacity:0;}}

.letter-sig{
  margin-top:28px;text-align:right;padding-top:14px;
  border-top:1px solid rgba(232,98,122,.08);
  display:none;
}
.sig-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:rgba(232,98,122,.5);}
.sig-note{font-family:'Lato',sans-serif;font-size:10px;font-weight:300;color:rgba(245,232,240,.2);letter-spacing:2px;margin-top:4px;text-transform:uppercase;}

/* Continue btn */
.continue-wrap{text-align:center;margin-top:28px;display:none;animation:fadeIn .7s forwards;}
.cont-btn{
  display:inline-block;padding:13px 36px;
  background:linear-gradient(160deg,#7a1a35,#500f22);
  border:1px solid rgba(232,98,122,.3);
  color:rgba(245,228,234,.85);
  font-family:'Lato',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:4px;text-transform:uppercase;
  cursor:none;text-decoration:none;transition:all .4s;
}
.cont-btn:hover{box-shadow:0 6px 28px rgba(120,10,40,.5);letter-spacing:5px;}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<div class="bg-grad"></div>
<div class="cursor" id="cursor">🌸</div>
<div class="exit-overlay" id="ov"></div>

<div class="page-wrap">

  <!-- Rose flower -->
  <div class="flower-scene">
    <div class="stem"></div>
    <div class="leaf"></div>
    <div class="leaf2"></div>
    <div class="petal-item"></div>
    <div class="petal-item"></div>
    <div class="petal-item"></div>
    <div class="petal-item"></div>
    <div class="petal-item"></div>
    <div class="petal-item"></div>
    <div class="petal-item"></div>
    <div class="petal-item"></div>
    <div class="petal-inner"></div>
    <div class="petal-inner"></div>
    <div class="petal-inner"></div>
    <div class="petal-inner"></div>
    <div class="flower-core"></div>
  </div>

  <p class="sorry-pre-label">🌸 &nbsp; a page just for you</p>
  <h1 class="sorry-title">I'm <em>sorry,</em><br>Faiqa.</h1>
  <p class="sorry-sub">tap the seal to read this honestly</p>

  <div class="letter-card" id="letterCard">
    <!-- Sealed -->
    <div class="seal-state" id="sealState">
      <div class="rose-seal" id="sealBtn">🌸</div>
      <p class="seal-label">tap to open</p>
    </div>
    <!-- Open -->
    <div class="open-state" id="openState">
      <div class="letter-from">🌸 &nbsp; written honestly — no excuses — just the truth</div>
      <div class="letter-body" id="ltxt"><span class="tw-cursor"></span></div>
      <div class="letter-sig" id="lsig">
        <div class="sig-name">— Waqas &nbsp;🌸</div>
        <div class="sig-note">genuinely sorry · always</div>
      </div>
    </div>
  </div>

  <div class="continue-wrap" id="contWrap">
    <a href="index.html" class="cont-btn" id="nb">Back to Eid &nbsp; →</a>
  </div>
</div>

<script>
/* Cursor */
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

/* Starfield + falling petals canvas */
(function(){
  const cv=document.getElementById('bgc'),cx=cv.getContext('2d');
  function rs(){cv.width=innerWidth;cv.height=innerHeight;}
  rs();window.addEventListener('resize',rs);
  const st=[];
  for(let i=0;i<180;i++)st.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.2+.2,o:Math.random()*.5+.1,s:.002+Math.random()*.005,d:Math.random()>.5?1:-1});
  function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    const bg=cx.createRadialGradient(cv.width/2,cv.height*.6,0,cv.width/2,cv.height*.3,cv.width*.9);
    bg.addColorStop(0,'#100515');bg.addColorStop(.5,'#080210');bg.addColorStop(1,'#040108');
    cx.fillStyle=bg;cx.fillRect(0,0,cv.width,cv.height);
    st.forEach(s=>{s.o+=s.s*s.d;if(s.o>.65||s.o<.06)s.d*=-1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,180,200,${s.o*.7})`;cx.fill();});
    requestAnimationFrame(draw);
  }
  draw();
})();

/* Falling petals */
const petalEmojis=['🌸','🌷','✿','❀','🌺'];
for(let i=0;i<14;i++){
  const p=document.createElement('div');p.className='petal';
  p.textContent=petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.cssText=`left:${Math.random()*100}vw;--rot:${(Math.random()-.5)*360}deg;animation-duration:${12+Math.random()*16}s;animation-delay:${Math.random()*12}s;`;
  document.body.appendChild(p);
}

/* The letter text */
const sorryLetter=`Faiqa,

Main pehle sorry bolunga aur phir explain karunga — kyunki yeh ulta hona chahiye tha.

Jo baat maine poochi — woh galat thi. Tareeqa galat tha. Woh cheez poochni hi nahi chahiye thi. Aur mujhe pata tha jab main bol raha tha — phir bhi bol diya. Yeh meri ghalti hai, aur iske liye koi justification nahi hai.

Lekin jo cheez mujhe sabse zyada takleef deti hai woh yeh nahi hai.

Yeh hai — ke tum beemar thi. Fever tha. Tum pehle se thaki hui thi. Aur is waqt maine tumhara haath thamne ki jagah... 28 ghante ke liye gayab ho gaya. Tumhe yeh message karna pada ke mujhe ignore mat karo — jab ke ignore karne wala main tha. Tumhe pehle call karna pada — jab ke main tha jo tumhe manane aana chahiye tha.

Yeh carelessness nahi thi. Yeh ek choice thi. Aur mujhe is choice par sharm aati hai.

Tum ne ek baar kaha tha ke tum ne expect kiya tha ke main tum ko manaane keliye sari raat messages karta rahunga. Main woh insaan nahi bana us waqt. Aur tum deserve karti thi woh insaan.

Mujhe pata hai sirf sorry likhne se kuch nahi badalta. Lekin yeh jaano — koi din aisa nahi gaya jab main woh 28 ghante nahi socha. Koi din aisa nahi gaya jab mujhe guilty nahi laga.

Tum mere liye woh insaan ho jiske liye main khud se better banana chahta hun. Is Eid par — yehi dua hai. Ke tum jaano ke tum kisi ke liye is qadar ahem ho ke uski ghalti use raat ko neend nahi aane deti.

Main maafi manga raha hun. Puri tarah. Dil se.

🌸`;

/* Seal click */
document.getElementById('sealBtn').addEventListener('click', openLetter);
document.getElementById('sealBtn').addEventListener('touchend', function(e){e.preventDefault();openLetter();},{passive:false});

function openLetter(){
  document.getElementById('sealState').style.display='none';
  document.getElementById('openState').style.display='block';
  setTimeout(startType,350);
}

function startType(){
  const el=document.getElementById('ltxt');
  el.innerHTML='<span class="tw-cursor"></span>';
  let i=0;const ch=sorryLetter.split('');
  function type(){
    if(i>=ch.length){
      el.querySelector('.tw-cursor')?.remove();
      document.getElementById('lsig').style.display='block';
      document.getElementById('contWrap').style.display='block';
      return;
    }
    const c=el.querySelector('.tw-cursor');
    if(ch[i]==='\n')c.insertAdjacentHTML('beforebegin','<br>');
    else c.insertAdjacentText('beforebegin',ch[i]);
    i++;
    const d=ch[i-1]==='.'||ch[i-1]===','?150:ch[i-1]==='\n'?200:24;
    setTimeout(type,d);
  }
  setTimeout(type,300);
}

document.getElementById('nb')?.addEventListener('click',function(e){
  e.preventDefault();document.getElementById('ov').classList.add('active');
  setTimeout(()=>window.location.href=this.href,620);
});
</script>
</body>
</html>
