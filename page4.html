<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chapter III ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:#080401;overflow-x:hidden;}
body{font-family:'Lato',sans-serif;cursor:none;}
.cursor{position:fixed;z-index:9999;pointer-events:none;font-size:20px;transform:translate(-5px,-20px);filter:drop-shadow(0 0 5px rgba(200,148,58,.4));}
canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes floatCard{0%,100%{transform:var(--base-rot) translateY(0);}50%{transform:var(--base-rot) translateY(-4px);}}
@keyframes eidGlow{0%,100%{text-shadow:0 0 12px rgba(200,148,58,.25);}50%{text-shadow:0 0 30px rgba(200,148,58,.6);}}
@keyframes tapPulse{0%,100%{opacity:.25;}50%{opacity:.55;}}
@keyframes revealIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
@keyframes pinDrop{from{transform:translateX(-50%) translateY(-8px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.exit-overlay{position:fixed;inset:0;background:#080401;z-index:1000;opacity:0;pointer-events:none;transition:opacity .6s;}
.exit-overlay.active{opacity:1;pointer-events:all;}

.wrap{position:relative;z-index:1;min-height:100vh;padding:52px 20px 56px;max-width:900px;margin:0 auto;}

.page-header{text-align:center;margin-bottom:36px;animation:fadeIn .8s .1s both;}
.ch-label{font-family:'Lato',sans-serif;font-size:10px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:rgba(200,148,58,.4);margin-bottom:10px;}
.page-title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:clamp(26px,5vw,46px);color:#f0e4cc;line-height:1.1;margin-bottom:8px;animation:eidGlow 3s ease-in-out infinite;}
.page-title em{font-style:italic;color:#c8943a;}
.page-sub{font-family:'Lato',sans-serif;font-size:13px;font-weight:300;color:rgba(245,232,194,.28);letter-spacing:1.5px;animation:tapPulse 2.5s ease-in-out infinite;}

/* Responsive grid — 3 col desktop, 2 col phone */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px;}
@media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr);gap:12px;}}
@media(max-width:360px){.grid{grid-template-columns:1fr 1fr;gap:10px;}}

.pol{
  background:linear-gradient(160deg,#1e1600,#140f00);
  border:1px solid rgba(200,148,58,.1);
  padding:12px 12px 18px;
  position:relative;cursor:none;
  animation:fadeIn .7s both;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .35s,box-shadow .35s,transform .3s;
}
.pol:nth-child(1){--base-rot:rotate(-1.8deg);transform:rotate(-1.8deg);animation-delay:.2s;}
.pol:nth-child(2){--base-rot:rotate(.7deg);transform:rotate(.7deg);animation-delay:.28s;}
.pol:nth-child(3){--base-rot:rotate(-1.5deg);transform:rotate(-1.5deg);animation-delay:.36s;}
.pol:nth-child(4){--base-rot:rotate(1.3deg);transform:rotate(1.3deg);animation-delay:.44s;}
.pol:nth-child(5){--base-rot:rotate(-.6deg);transform:rotate(-.6deg);animation-delay:.52s;}
.pol:nth-child(6){--base-rot:rotate(1.6deg);transform:rotate(1.6deg);animation-delay:.6s;}

.pol.opened{border-color:rgba(200,148,58,.32);box-shadow:0 10px 36px rgba(0,0,0,.55),0 0 20px rgba(200,148,58,.07);}
.pol:active{transform:rotate(0deg) scale(.96) !important;}
.pol.opened{animation:floatCard 4s ease-in-out infinite;}

/* Photo area */
.photo{
  background:rgba(0,0,0,.3);border:1px solid rgba(200,148,58,.07);
  aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,6vw,44px);margin-bottom:10px;position:relative;overflow:hidden;
}
.photo::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(255,255,255,.04),transparent 60%);pointer-events:none;}

/* Reveal overlay */
.reveal-ov{
  position:absolute;inset:0;background:rgba(8,4,1,.93);
  display:flex;align-items:center;justify-content:center;padding:10px;
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
.pol.opened .reveal-ov{opacity:1;pointer-events:all;animation:revealIn .4s ease;}
.reveal-ov p{font-family:'Lato',sans-serif;font-style:italic;font-weight:300;font-size:clamp(10px,2.2vw,12px);color:rgba(245,232,194,.88);line-height:1.7;text-align:center;}
.reveal-ov .gl{font-family:'Lato',sans-serif;font-size:clamp(9px,1.8vw,10px);color:rgba(200,148,58,.8);display:block;margin-top:7px;text-align:center;letter-spacing:1px;}

/* Tap hint */
.tap-ov{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px;pointer-events:none;}
.tap-badge{font-family:'Lato',sans-serif;font-size:clamp(7px,1.5vw,9px);font-weight:700;color:rgba(200,148,58,.35);letter-spacing:3px;text-transform:uppercase;background:rgba(8,4,1,.5);padding:3px 7px;animation:tapPulse 2s ease-in-out infinite;}
.pol.opened .tap-ov{display:none;}

/* Caption */
.cap{font-family:'Cormorant Garamond',serif;font-size:clamp(12px,2.5vw,14px);color:rgba(245,232,194,.58);text-align:center;line-height:1.3;}
.cap-date{display:block;font-family:'Lato',sans-serif;font-size:clamp(7px,1.5vw,9px);color:rgba(200,148,58,.3);letter-spacing:2px;margin-top:3px;text-transform:uppercase;font-weight:400;}

/* Pin */
.pin{position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#d44040,#6b0f0f);box-shadow:0 2px 5px rgba(0,0,0,.4);animation:pinDrop .4s both;}

.btn-wrap{text-align:center;animation:fadeIn .7s .9s both;opacity:0;}
.next-btn{display:inline-block;padding:13px 34px;background:transparent;border:1px solid rgba(200,148,58,.22);color:rgba(200,148,58,.62);font-family:'Lato',sans-serif;font-weight:700;font-size:11px;letter-spacing:4px;text-transform:uppercase;cursor:none;text-decoration:none;transition:all .4s;position:relative;overflow:hidden;}
.next-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(200,148,58,.04),transparent);transform:translateX(-100%);transition:transform .5s;}
.next-btn:hover::before{transform:translateX(100%);}
.next-btn:hover{border-color:rgba(200,148,58,.6);color:rgba(200,148,58,1);background:rgba(200,148,58,.05);letter-spacing:5px;}

.open-count{font-family:'Lato',sans-serif;font-size:10px;font-weight:300;color:rgba(200,148,58,.28);text-align:center;margin-bottom:16px;letter-spacing:2px;transition:color .3s;}
.open-count.all{color:rgba(200,148,58,.6);animation:eidGlow 2s ease-in-out infinite;}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="cursor" id="cursor">🪶</div>
<div class="exit-overlay" id="ov"></div>

<div class="wrap">
  <div class="page-header">
    <div class="ch-label">· Chapter III ·</div>
    <h1 class="page-title">Moments that<br><em>mean something.</em> 🌸</h1>
    <p class="page-sub">tap each card to open it</p>
  </div>

  <p class="open-count" id="oc">0 of 6 opened</p>
  <div class="grid" id="grid"></div>

  <div class="btn-wrap">
    <a href="page5.html" class="next-btn" id="nb">Chapter IV &nbsp; →</a>
  </div>
</div>

<script>
// Deep, specific, emotional — not generic one-liners
const mems=[
  {
    e:"🌙",cap:"Tonight's Moon",date:"Eid ul-Adha 2026",
    b:"This exact moon — tonight — rises knowing your name. Every dua you make under it carries weight I don't fully understand. But I believe in it.",
    gl:"Eid Mubarak, Faiqa."
  },
  {
    e:"🤲",cap:"Your Duas",date:"Always heard",
    b:"You pray like the answer is already on its way. That certainty, that sincerity — it's the kind of faith that moves things. I've seen it work for you.",
    gl:"May every single one come true."
  },
  {
    e:"📚",cap:"The Late Nights",date:"The CA grind",
    b:"Nobody saw those nights. The self-doubt, the exhaustion, the decision to keep going anyway. I did. And I am more proud of you than you will ever know.",
    gl:"You will get there. I'm certain."
  },
  {
    e:"💛",cap:"The Way You Love",date:"Every quiet day",
    b:"You don't announce it. You just show up. You remember things. You check in when people least expect it. That kind of love is rare — and it's entirely yours.",
    gl:"You are someone rare."
  },
  {
    e:"✦",cap:"Your Real Name",date:"A gift given quietly",
    b:"Faiqa. You said it like it was nothing. But I understood it was everything. That name, given like that — I will carry it carefully. Always.",
    gl:"It means the world."
  },
  {
    e:"🌸",cap:"This Eid",date:"2026 · for you",
    b:"May this Eid give you peace that settles deep. Joy that doesn't leave with the day. And one moment where you feel — truly, completely — that you are loved. You deserve it all.",
    gl:"Always. ✦"
  },
];

let openCount=0;
const grid=document.getElementById('grid');
const oc=document.getElementById('oc');
const nb=document.getElementById('nb');

mems.forEach(({e,cap,date,b,gl},i)=>{
  const c=document.createElement('div');c.className='pol';
  c.innerHTML=`
    <div class="pin" style="animation-delay:${.2+i*.08}s"></div>
    <div class="photo">
      <span>${e}</span>
      <div class="reveal-ov"><div><p>${b}</p><span class="gl">✦ &nbsp; ${gl}</span></div></div>
      <div class="tap-ov"><span class="tap-badge">tap to open</span></div>
    </div>
    <div class="cap">${cap}<span class="cap-date">${date}</span></div>`;

  function openCard(){
    if(c.classList.contains('opened'))return;
    c.classList.add('opened');
    c.style.setProperty('--base-rot','rotate(0deg)');
    c.style.transform='rotate(0deg) translateY(-5px) scale(1.02)';
    openCount++;
    oc.textContent=`${openCount} of ${mems.length} opened`;
    if(openCount===mems.length){
      oc.classList.add('all');
      oc.textContent='All opened ✦';
      nb.parentElement.style.opacity='1';
      celebrate();
    }
    sparkBurst(c);
  }
  c.addEventListener('click',openCard);
  c.addEventListener('touchend',function(ev){ev.preventDefault();openCard();},{passive:false});
  grid.appendChild(c);
});

function sparkBurst(el){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+18;
  ['✦','🌙','·','🌸'].forEach((s,i)=>{
    const d=document.createElement('div');d.textContent=s;
    const angle=(i/4)*Math.PI*2;
    d.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;font-size:.9rem;color:rgba(200,148,58,.85);pointer-events:none;z-index:999;transition:all .7s ease;opacity:1;`;
    document.body.appendChild(d);
    setTimeout(()=>{d.style.transform=`translate(${Math.cos(angle)*44}px,${Math.sin(angle)*44-28}px) scale(0)`;d.style.opacity='0';},20);
    setTimeout(()=>d.remove(),800);
  });
}

function celebrate(){
  const emojis=['🌸','✨','💛','🤲','🌙','💫','🌟'];
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      const d=document.createElement('div');
      d.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      d.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:${15+Math.random()*65}vh;font-size:${13+Math.random()*14}px;pointer-events:none;z-index:50;opacity:0;transition:opacity .4s,transform 2.4s ease;`;
      document.body.appendChild(d);
      requestAnimationFrame(()=>{d.style.opacity='.5';d.style.transform='translateY(-40px)';});
      setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),500);},2200);
    },i*200);
  }
}

/* Starfield */
const canvas=document.getElementById('stars');
const ctx=canvas.getContext('2d');
let stars=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
function initStars(){stars=[];for(let i=0;i<70;i++){stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.1+.2,a:Math.random(),da:(Math.random()-.5)*.003,sp:Math.random()*.12+.04});}}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
    s.y-=s.sp;if(s.y<0){s.y=canvas.height;s.x=Math.random()*canvas.width;}
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,148,58,${s.a*.35})`;ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
resize();initStars();drawStars();
window.addEventListener('resize',()=>{resize();initStars();});

const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
document.getElementById('nb').addEventListener('click',function(e){
  e.preventDefault();document.getElementById('ov').classList.add('active');
  setTimeout(()=>window.location.href=this.href,620);
});
</script>
</body>
</html>
